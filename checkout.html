<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | FoodRush</title>
  <meta name="description" content="Review your order, enter your delivery address, apply vouchers and choose your payment method." />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#FF4D24',light:'#FF6B4A',dark:'#E03D18'},secondary:'#1A1A1A'},fontFamily:{sans:['Inter','sans-serif'],heading:['Poppins','sans-serif']}}}}</script>
  <link rel="stylesheet" href="assets/css/custom.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-[#F8F9FA]">

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container-app flex items-center gap-3 h-[68px]">
    <a href="restaurant.html" class="btn btn-ghost btn-icon"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
    <h1 class="font-heading font-bold text-lg">Checkout</h1>
    <div class="ml-auto text-sm text-gray-500">Step 1 of 2</div>
  </div>
</nav>

<div class="container-app py-8 grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
  <!-- LEFT: Forms -->
  <div class="lg:col-span-2 space-y-5">

    <!-- Delivery Address -->
    <div class="card p-5">
      <h2 class="font-heading font-bold text-base mb-4 flex items-center gap-2">
        <i data-lucide="map-pin" class="w-5 h-5 text-primary"></i> Delivery Address
      </h2>
      <div class="space-y-3">
        <label class="flex items-center gap-3 p-4 border-2 border-primary rounded-xl cursor-pointer bg-primary/5">
          <input type="radio" name="address" checked class="accent-[#FF4D24]" />
          <div class="flex-1">
            <div class="font-semibold text-sm">🏠 Home</div>
            <div class="text-xs text-gray-500 mt-0.5">123 Nguyen Hue Blvd, District 1, Ho Chi Minh City</div>
          </div>
          <span class="badge badge-primary text-xs">Default</span>
        </label>
        <label class="flex items-center gap-3 p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-primary transition">
          <input type="radio" name="address" class="accent-[#FF4D24]" />
          <div class="flex-1">
            <div class="font-semibold text-sm">🏢 Office</div>
            <div class="text-xs text-gray-500 mt-0.5">45 Le Loi St, District 3, Ho Chi Minh City</div>
          </div>
        </label>
        <button class="btn btn-ghost w-full border border-dashed border-gray-300 text-gray-500 btn-sm">
          <i data-lucide="plus" class="w-4 h-4"></i> Add New Address
        </button>
      </div>
      <div class="mt-4">
        <label class="text-sm font-semibold text-gray-700">Delivery Note (Optional)</label>
        <input type="text" placeholder="e.g. Ring bell twice, 3rd floor" class="input-field mt-2 text-sm" />
      </div>
    </div>

    <!-- Payment Method -->
    <div class="card p-5">
      <h2 class="font-heading font-bold text-base mb-4 flex items-center gap-2">
        <i data-lucide="credit-card" class="w-5 h-5 text-primary"></i> Payment Method
      </h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <label class="flex items-center gap-3 p-4 border-2 border-primary rounded-xl cursor-pointer bg-primary/5">
          <input type="radio" name="payment" checked class="accent-[#FF4D24]" />
          <span class="text-2xl">💵</span>
          <div>
            <div class="font-semibold text-sm">Cash on Delivery</div>
            <div class="text-xs text-gray-500">Pay when delivered</div>
          </div>
        </label>
        <label class="flex items-center gap-3 p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-primary transition">
          <input type="radio" name="payment" class="accent-[#FF4D24]" />
          <span class="text-2xl">💳</span>
          <div>
            <div class="font-semibold text-sm">Credit Card</div>
            <div class="text-xs text-gray-500">Visa, Mastercard</div>
          </div>
        </label>
        <label class="flex items-center gap-3 p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-primary transition">
          <input type="radio" name="payment" class="accent-[#FF4D24]" />
          <span class="text-2xl">📱</span>
          <div>
            <div class="font-semibold text-sm">E-Wallet</div>
            <div class="text-xs text-gray-500">MoMo, ZaloPay, VNPay</div>
          </div>
        </label>
        <label class="flex items-center gap-3 p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-primary transition">
          <input type="radio" name="payment" class="accent-[#FF4D24]" />
          <span class="text-2xl">🏦</span>
          <div>
            <div class="font-semibold text-sm">Bank Transfer</div>
            <div class="text-xs text-gray-500">Direct bank payment</div>
          </div>
        </label>
      </div>
    </div>

    <!-- Voucher -->
    <div class="card p-5">
      <h2 class="font-heading font-bold text-base mb-4 flex items-center gap-2">
        <i data-lucide="tag" class="w-5 h-5 text-primary"></i> Voucher & Promo
      </h2>
      <div class="voucher-input-wrap">
        <input id="voucher-input" type="text" placeholder="Enter voucher code (e.g. RUSH20)" class="input-field text-sm" />
        <button onclick="applyVoucher()" class="btn btn-primary flex-shrink-0">Apply</button>
      </div>
      <div id="voucher-msg" class="text-sm mt-2 hidden"></div>
      <div class="mt-3 flex flex-wrap gap-2">
        <button onclick="document.getElementById('voucher-input').value='RUSH20'" class="badge badge-primary cursor-pointer hover:bg-primary hover:text-white transition text-xs px-3 py-1.5">RUSH20 — 20% Off</button>
        <button onclick="document.getElementById('voucher-input').value='FREEDELIVERY'" class="badge badge-success cursor-pointer hover:bg-green-600 hover:text-white transition text-xs px-3 py-1.5">FREEDELIVERY — Free Shipping</button>
        <button onclick="document.getElementById('voucher-input').value='WELCOME5'" class="badge badge-warning cursor-pointer text-xs px-3 py-1.5">WELCOME5 — $5 Off</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Order Summary -->
  <div class="lg:col-span-1">
    <div class="cart-panel p-5">
      <h2 class="font-heading font-bold text-base mb-4">Order Summary</h2>
      <div class="flex items-center gap-3 mb-4 p-3 bg-gray-50 rounded-xl">
        <img src="https://api.dicebear.com/7.x/shapes/svg?seed=pizza&backgroundColor=FF4D24" alt="" class="w-9 h-9 rounded-lg" />
        <div class="text-sm font-semibold">The Pizza Lab</div>
      </div>
      <div class="space-y-2.5 text-sm">
        <div class="flex justify-between text-gray-600"><span>1× Margherita Classic</span><span>$12.99</span></div>
        <div class="flex justify-between text-gray-600"><span>1× BBQ Chicken Pizza</span><span>$15.99</span></div>
        <div class="flex justify-between text-gray-600"><span>2× San Pellegrino</span><span>$6.98</span></div>
      </div>
      <div class="mt-4 pt-4 border-t space-y-2 text-sm">
        <div class="flex justify-between text-gray-600"><span>Subtotal</span><span>$35.96</span></div>
        <div class="flex justify-between text-gray-600"><span>Delivery fee</span><span class="text-green-600">Free</span></div>
        <div id="discount-row" class="flex justify-between text-green-600 hidden"><span>Voucher discount</span><span id="discount-val">-$0.00</span></div>
        <div class="flex justify-between font-bold text-base pt-2 border-t">
          <span>Total</span><span id="checkout-total" class="text-primary">$35.96</span>
        </div>
      </div>
      <a href="tracking.html" class="btn btn-primary w-full mt-5 btn-lg" onclick="this.innerHTML='<span>Processing…</span>'">
        <i data-lucide="lock" class="w-4 h-4"></i> Place Order
      </a>
      <div class="flex items-center justify-center gap-1.5 mt-3 text-xs text-gray-400">
        <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Secure & encrypted checkout
      </div>
    </div>
  </div>
</div>

<script>
  lucide.createIcons();
  const vouchers = { RUSH20: { type:'percent', val:20 }, FREEDELIVERY: { type:'fixed', val:2.50 }, WELCOME5: { type:'fixed', val:5 } };
  function applyVoucher() {
    const code = document.getElementById('voucher-input').value.trim().toUpperCase();
    const msg = document.getElementById('voucher-msg');
    const row = document.getElementById('discount-row');
    const dv  = document.getElementById('discount-val');
    const tot = document.getElementById('checkout-total');
    msg.classList.remove('hidden');
    if (vouchers[code]) {
      const v = vouchers[code];
      const base = 35.96;
      let disc = v.type === 'percent' ? base * v.val / 100 : v.val;
      disc = Math.min(disc, base);
      msg.textContent = `✅ Voucher applied! You saved $${disc.toFixed(2)}`;
      msg.className = 'text-sm mt-2 text-green-600 font-semibold';
      dv.textContent = `-$${disc.toFixed(2)}`;
      tot.textContent = `$${(base - disc).toFixed(2)}`;
      row.classList.remove('hidden');
    } else {
      msg.textContent = '❌ Invalid or expired voucher code.';
      msg.className = 'text-sm mt-2 text-red-500 font-semibold';
      row.classList.add('hidden');
      tot.textContent = '$35.96';
    }
  }
</script>
</body>
</html>
